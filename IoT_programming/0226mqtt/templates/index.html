<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Weather Station</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div style="width: 80%; margin: auto;">
        <canvas id="myChart"></canvas>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <h3>LED Control</h3>
        <button onclick="sendLED('ON')" style="background-color: #ff4d4d; color: white; padding: 15px 30px; border: none; cursor: pointer;">LED ON</button>
        <button onclick="sendLED('OFF')" style="background-color: #333; color: white; padding: 15px 30px; border: none; cursor: pointer;">LED OFF</button>
    </div>

    <hr style="width: 80%; margin: 40px auto;">
    
    <div style="text-align: center; margin-top: 30px; padding: 20px; border: 1px dashed #ccc; width: 50%; margin-left: auto; margin-right: auto;">
        <h3>Custom MQTT Message</h3>
        <div style="margin-bottom: 10px;">
            <input type="text" id="customTopic" placeholder="Topic (예: room/light)" style="padding: 10px; width: 70%;">
        </div>
        <div style="margin-bottom: 10px;">
            <input type="text" id="customMessage" placeholder="Message (예: toggle)" style="padding: 10px; width: 70%;">
        </div>
        <button onclick="sendMQTT()" style="background-color: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer;">Send Message</button>
    </div>

    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Temperature (°C)',
                    borderColor: 'rgb(255, 99, 132)',
                    data: []
                }, {
                    label: 'Humidity (%)',
                    borderColor: 'rgb(54, 162, 235)',
                    data: []
                }]
            }
        });

        // 3초마다 서버에서 데이터를 새로 가져와 차트 업데이트
        setInterval(() => {
            fetch('/get_data')
                .then(response => response.json())
                .then(data => {
                    myChart.data.labels = data.map((_, i) => i);
                    myChart.data.datasets[0].data = data.map(d => d.temperature);
                    myChart.data.datasets[1].data = data.map(d => d.humidity);
                    myChart.update();
                });
        }, 3000);

        function sendLED(ledStatus) {
            fetch('/control_led', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: ledStatus })
            })
            .then(response => response.json())
            .then(data => {
                if(data.result === "success") {
                    alert("LED가 " + ledStatus + " 되었습니다.");
                }
            })
            .catch(error => console.error('에러 발생:', error));
        }

        // 추가된 자유 전송 함수
        function sendMQTT() {
            const topic = document.getElementById('customTopic').value;
            const message = document.getElementById('customMessage').value;

            if(!topic || !message) {
                alert("토픽과 메시지를 모두 입력해주세요.");
                return;
            }

            fetch('/publish', {  // app.py에 추가할 /publish 경로
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic: topic, message: message })
            })
            .then(response => response.json())
            .then(data => {
                if(data.result === "success") {
                    alert("성공적으로 메시지를 보냈습니다!");
                }
            })
            .catch(error => console.error('에러 발생:', error));
        }
    </script>
</body>
</html>
